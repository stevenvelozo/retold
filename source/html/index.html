<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Retold Manager</title>

	<!-- Favicons. Generated at build time by
	     `npx pict-section-theme-favicons --brand <brand-file> --out <out-dir>`
	     and committed under web-application/favicons/. The static SVG is
	     prefers-color-scheme aware so it auto-swaps with the OS theme;
	     the PNG fallbacks cover Safari + every browser that doesn't
	     render SVG favicons natively. -->
	<link rel="icon" type="image/svg+xml" href="app/favicons/favicon.svg">
	<link rel="icon" type="image/png" sizes="16x16"  href="app/favicons/favicon-16.png">
	<link rel="icon" type="image/png" sizes="32x32"  href="app/favicons/favicon-32.png">
	<link rel="icon" type="image/png" sizes="48x48"  href="app/favicons/favicon-48.png">
	<link rel="icon" type="image/png" sizes="64x64"  href="app/favicons/favicon-64.png">
	<link rel="apple-touch-icon" sizes="180x180"     href="app/favicons/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="192x192" href="app/favicons/favicon-192.png">
	<link rel="icon" type="image/png" sizes="512x512" href="app/favicons/favicon-512.png">

	<link rel="stylesheet" href="css/retold-manager.css">
	<style id="PICT-CSS"></style>
</head>
<body>
	<div id="RetoldManager-Application-Container"></div>
	<!-- Runtime assets are served from /app/*. The server transparently 302s
	     to a CDN (unpkg) for files not committed under web-application/, so a
	     fresh clone works with or without the runtime files pre-dropped. -->
	<script src="app/pict.min.js"></script>
	<!-- Only the minified bundle is committed; the dev bundle + source maps
	     are .gitignored and regenerated by `npx quack build` when you do
	     active development on the manager itself. -->
	<script src="app/retold-manager.min.js"></script>
	<script>
		Pict.safeLoadPictApplication(RetoldManagerApplication, 2);
	</script>
</body>
</html>
